[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:slskd]
command=/opt/slskd/slskd --app-dir=/usr/src/app/slskd-data --slsk-username="%(ENV_SLSKD_SLSK_USERNAME)s" --slsk-password="%(ENV_SLSKD_SLSK_PASSWORD)s" --api-key="%(ENV_SLSKD_API_KEY)s" --downloads-dir="/downloads"
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:bot]
command=npm start
directory=/usr/src/app
autostart=true
autorestart=true
startsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
