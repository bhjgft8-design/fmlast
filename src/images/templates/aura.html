<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .background-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px) brightness(0.4);
            transform: scale(1.1);
            z-index: 0;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 2;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: auto;
        }

        .avatar-container {
            position: relative;
            margin-right: 30px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .freq-label {
            font-size: 18px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .username {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* CENTER */
        .aura-center {
            text-align: center;
            margin: auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .aura-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 150px;
            letter-spacing: -4px;
            line-height: 0.9;
            text-shadow: 0 10px 60px rgba(255, 255, 255, 0.2);
            background: linear-gradient(to bottom, #ffffff 0%, #cccccc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 0 20px; /* Prevent italic clipping */
        }

        .genres-row {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .genre-tag {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            font-weight: 400;
        }

        .dot {
            color: rgba(255, 255, 255, 0.3);
        }

        /* FOOTER */
        .footer {
            margin-top: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-artist-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .top-artist-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 36px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .divider {
            width: 300px;
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            margin-bottom: 25px;
        }

        .period-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 5px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <img src="{{coverUrl}}" class="background-cover" alt="Background">
    <div class="vignette"></div>
    <div class="noise"></div>

    <div class="content">
        <div class="header">
            <div class="avatar-container">
                <img src="{{avatarUrl}}" class="avatar" alt="Avatar">
            </div>
            <div class="header-text">
                <div class="freq-label">YOUR {{displayFreqText}}</div>
                <div class="username">{{displayName}}</div>
            </div>
        </div>

        <div class="aura-center">
            <div class="aura-name">{{auraName}}</div>
            <div class="genres-row">
                {{#each genres}}
                <span class="genre-tag">{{this}}</span>
                {{#unless @last}}<span class="dot">•</span>{{/unless}}
                {{/each}}
            </div>
        </div>

        <div class="footer">
            <div class="top-artist-label">TOP ARTIST OF THE PERIOD</div>
            <div class="top-artist-name">{{topArtist}}</div>
            <div class="divider"></div>
            <div class="period-info">AURA ANALYSIS • {{displayPeriodLabel}}</div>
        </div>
    </div>
</body>
</html>
