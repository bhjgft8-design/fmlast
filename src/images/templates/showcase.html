<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Bebas+Neue&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #08080a;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            width: 1200px;
            height: 600px;
            background: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            position: relative;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.12) 0%, transparent 40%);
            z-index: -2;
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: {{{bgPattern}}};
            opacity: 0.15;
            z-index: -1;
        }

        /* ── Sidebar (Profile) ── */
        .sidebar {
            width: 380px;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .avatar-wrap {
            position: relative;
            padding: 6px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            object-fit: cover;
        }

        .username {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            text-align: center;
        }

        .stats-col {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-l { font-size: 14px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 1px; }
        .stat-v { font-size: 24px; font-weight: 800; color: #fff; }

        /* ── Main Content ── */
        .main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .np-banner {
            height: 140px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 25px;
            position: relative;
        }

        .np-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; flex-shrink: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .np-txt { flex-grow: 1; overflow: hidden; }
        .np-lab { font-size: 12px; font-weight: 800; color: #1DB954; letter-spacing: 2px; margin-bottom: 4px; }
        .np-title { font-size: 28px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .np-art { font-size: 18px; color: #a1a1aa; }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex: 1;
        }

        .card-mini {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .card-art-wrap {
            aspect-ratio: 1;
            width: 100%;
            position: relative;
        }

        .card-art { width: 100%; height: 100%; object-fit: cover; }
        
        .card-footer {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            margin-top: auto;
        }

        .c-art { font-size: 11px; font-weight: 600; color: #71717a; text-transform: uppercase; }
        .c-name { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .rarity-pill {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Border Glows */
        .card-mini.glitch { border-color: #39FF14; }
        .card-mini.holo { border-color: #00FFFF; }

        .footer-tag {
            text-align: right;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: #3f3f46;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>

    <div class="sidebar">
        <div class="avatar-wrap">
            <img src="{{avatarUrl}}" class="avatar" />
        </div>
        <h1 class="username">{{username}}</h1>
        
        <div class="stats-col">
            <div class="stat-item">
                <span class="stat-l">Vinyls</span>
                <span class="stat-v">{{vinylScrapsStr}}</span>
            </div>
            <div class="stat-item">
                <span class="stat-l">Crowns</span>
                <span class="stat-v">{{crownsStr}}</span>
            </div>
        </div>
    </div>

    <div class="main">
        {{#if nowPlaying}}
        <div class="np-banner">
            <img src="{{nowPlaying.image}}" class="np-img" />
            <div class="np-txt">
                <div class="np-lab">LIVE NOW</div>
                <div class="np-title">{{nowPlaying.track}}</div>
                <div class="np-art">{{nowPlaying.artist}}</div>
            </div>
        </div>
        {{else}}
        <div class="np-banner">
            <div class="np-txt" style="text-align: center;">
                <div class="np-lab" style="color: #3f3f46;">CURRENTLY SILENT</div>
            </div>
        </div>
        {{/if}}

        <div class="roster-grid">
            {{#each processedCards}}
            <div class="card-mini {{variantLower}}">
                <div class="card-art-wrap">
                    <img src="{{image}}" class="card-art" />
                    <div class="rarity-pill" style="color: {{rarityColor}}">{{rarity}}</div>
                </div>
                <div class="card-footer">
                    <div class="c-art">{{artistName}}</div>
                    <div class="c-name">{{albumName}}</div>
                </div>
            </div>
            {{/each}}
        </div>

        <div class="footer-tag">SERENETIA BINDER v2</div>
    </div>
</body>
</html>
