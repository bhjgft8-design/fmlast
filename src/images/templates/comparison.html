<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 800px;
            height: 400px;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        .side {
            flex: 1;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .label {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: 900;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.2);
            z-index: 4;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="side" style="background-image: url('{{urlA}}');">
            <div class="label">A</div>
        </div>
        <div class="divider"></div>
        <div class="side" style="background-image: url('{{urlB}}');">
            <div class="label">B</div>
        </div>
    </div>
</body>
</html>
