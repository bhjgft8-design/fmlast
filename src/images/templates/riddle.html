<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Outfit:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1080px;
            background: #0d0221;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #ff00ff;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(180deg, #0d0221 0%, #240b36 100%);
        }

        /* Retrowave Sun */
        #sun {
            position: absolute;
            bottom: 20%;
            width: 600px;
            height: 600px;
            background: linear-gradient(0deg, #ff00ff 0%, #ff8c00 100%);
            border-radius: 50%;
            box-shadow: 0 0 100px #ff00ff;
            mask-image: linear-gradient(to bottom, 
                black 0%, black 10%, transparent 10%,
                transparent 15%, black 15%, black 25%,
                transparent 25%, transparent 30%, black 30%, 
                black 45%, transparent 45%, transparent 55%, 
                black 55%, black 75%, transparent 75%, transparent 100%);
            z-index: 1;
        }

        /* Neon Grid */
        #grid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.3) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(500px) rotateX(60deg);
            z-index: 2;
        }

        /* Scanning Lines */
        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1),
                rgba(0,0,0,0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        #content {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .title {
            font-family: 'Major Mono Display', monospace;
            font-size: 32px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 20px;
        }

        .emoji-display {
            font-size: 160px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 60px 100px;
            border-radius: 30px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.4), inset 0 0 30px rgba(255, 0, 255, 0.2);
            line-height: 1;
        }

        .hint {
            margin-top: 40px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            background: #ff00ff;
            padding: 10px 30px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            letter-spacing: 2px;
        }

        .brand {
            position: absolute;
            bottom: 40px;
            font-family: 'Major Mono Display', monospace;
            font-size: 18px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 5px;
            z-index: 6;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="grid"></div>
        <div id="sun"></div>
        <div id="scanlines"></div>

        <div id="content">
            <div class="title">Silent Scrobble</div>
            <div class="emoji-display">{{emojis}}</div>
            {{#if showHint}}
            <div class="hint">{{hintLabel}}: {{hintValue}}</div>
            {{/if}}
        </div>

        <div class="brand">Retro Terminal V.1.0</div>
    </div>
</body>
</html>
