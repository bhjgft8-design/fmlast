<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-radius: 12px;
            --gap: 15px;
            --accent-color: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            width: var(--page-width);
            height: var(--page-height);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-container {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: var(--gap);
            padding: var(--gap);
            width: 100%;
            height: 100%;
        }

        .album-card {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: #1a1a1a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(145deg, #1a1a1a, #222);
            text-align: center;
            padding: 20px;
        }

        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 18px;
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 10;
            letter-spacing: -0.5px;
        }

        .stats-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 10px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 1;
        }

        .album-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .artist-name {
            font-size: 11px;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }
    </style>
</head>
<body style="--page-width: {{width}}px; --page-height: {{height}}px; --grid-size: {{gridSize}};">
    <div class="noise"></div>
    <div class="chart-container">
        {{#each albums}}
        <div class="album-card">
            <div class="rank-badge">#{{rank}}</div>
            {{#if imageUrl}}
            <img src="{{imageUrl}}" class="album-art" alt="{{name}}">
            {{else}}
            <div class="placeholder">
                <span>{{#if name}}{{name}}{{else}}No Metadata{{/if}}</span>
            </div>
            {{/if}}
            
            <div class="stats-overlay">
                <div class="album-name">{{name}}</div>
                <div class="artist-name">{{artist}}</div>
            </div>
        </div>
        {{/each}}
    </div>
</body>
</html>
