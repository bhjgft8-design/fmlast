<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: {{#if accentColor}}{{accentColor}}{{else}}#ffffff{{/if}};
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        /* Full Background Image */
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{coverUrl}}');
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* Subtle zoom animation effect can go here if we ever do videos, but for images this is perfect */
        }

        /* Gradient Overlay to ensure readability on any cover */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.6) 40%, 
                rgba(0, 0, 0, 0.1) 70%, 
                transparent 100%
            );
            z-index: 2;
        }

        /* Content Container anchored to bottom */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 70px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .track-name {
            font-family: 'Outfit', sans-serif;
            font-size: 85px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 4px 25px rgba(0,0,0,0.9);
        }

        .artist-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 40px;
            width: 100%;
        }

        .artist-name {
            font-size: 42px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            gap: 22px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            flex: 1;
        }

        .artist-avatar {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            background-image: url('{{artistAvatarUrl}}');
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .artist-avatar.hidden {
            display: none;
        }

        .artist-name::before {
            content: '';
            display: block;
            width: 36px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 20px var(--accent);
        }

        .artist-name.with-avatar::before {
            display: none;
        }

        .main-stats {
            display: flex;
            gap: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 65px; /* Smaller numbers */
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 25px rgba(0,0,0,0.9);
            margin-bottom: -5px;
        }

        .main-stats .stat {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .main-stats .label {
            font-size: 50px; /* Increased from 36px */
            color: var(--accent);
            opacity: 0.9;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            padding-top: 35px;
        }

        .album-name {
            font-size: 34px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 14px;
            text-shadow: 0 3px 15px rgba(0,0,0,0.8);
            max-width: 65%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-icon {
            width: 30px;
            height: 30px;
            opacity: 0.8;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .badge-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="track-name">{{trackName}}</div>
        
        <div class="artist-row">
            <div class="artist-name {{#if artistAvatarUrl}}with-avatar{{/if}}">
                <div class="artist-avatar {{#unless artistAvatarUrl}}hidden{{/unless}}"></div>
                {{artistName}}
            </div>

            {{#if hasStats}}
            <div class="main-stats">
                {{#if artistScrobbles}}
                <div class="stat">
                    <span class="label">A/S</span> {{artistScrobbles}}
                </div>
                {{/if}}
                {{#if trackScrobbles}}
                <div class="stat">
                    <span class="label">T/S</span> {{trackScrobbles}}
                </div>
                {{/if}}
            </div>
            {{/if}}
        </div>
        
        <div class="meta-row">
            <div class="album-name">
                <svg class="album-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                {{albumName}}
            </div>
            <div class="badge-group">
                {{#if badgeText}}
                <div class="badge">{{badgeText}}</div>
                {{/if}}
            </div>
        </div>
    </div>
</body>
</html>
