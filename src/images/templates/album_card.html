<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 800px;
            height: 900px;
            background: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse 85% 50% at 50% 115%,
                color-mix(in srgb, var(--rarity-color, #5865F2) 22%, transparent) 0%,
                transparent 70%
            );
            pointer-events: none;
        }

        /* ── Outer card ── */
        .card {
            width: 740px;
            height: 850px;
            position: relative;
        }

        /* ── Album art ── */
        .album-face {
            position: absolute;
            inset: 0;
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.9),
                0 40px 100px rgba(0,0,0,0.95);
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Plastic cello film ── */
        .plastic-film {
            position: absolute;
            inset: -4px;
            border-radius: 6px;
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }

        .plastic-film svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .film-border {
            position: absolute;
            inset: -4px;
            border-radius: 6px;
            border: 3px solid rgba(255,255,255,0.32);
            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.10),
                0 0 0 1px rgba(0,0,0,0.7);
            z-index: 14;
            pointer-events: none;
        }

        /* ── Glares ── */
        .glare-main {
            position: absolute;
            top: -10%;
            left: -8%;
            width: 55%;
            height: 80%;
            background: linear-gradient(
                132deg,
                rgba(255,255,255,0.30) 0%,
                rgba(255,255,255,0.12) 22%,
                rgba(255,255,255,0.04) 52%,
                transparent 72%
            );
            border-radius: 50%;
            transform: rotate(-10deg);
            z-index: 12;
            pointer-events: none;
        }

        .glare-crease {
            position: absolute;
            top: 22%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.20) 15%,
                rgba(255,255,255,0.38) 42%,
                rgba(255,255,255,0.18) 68%,
                transparent 92%
            );
            transform: rotate(-1.5deg);
            z-index: 13;
            pointer-events: none;
        }

        .glare-crease-2 {
            position: absolute;
            top: 60%;
            left: 0;
            width: 65%;
            height: 1.5px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.16) 20%,
                rgba(255,255,255,0.26) 50%,
                transparent 82%
            );
            transform: rotate(0.8deg);
            z-index: 13;
            pointer-events: none;
        }

        .glare-pool {
            position: absolute;
            bottom: 9%;
            right: 4%;
            width: 22%;
            height: 18%;
            background: radial-gradient(
                ellipse at center,
                rgba(255,255,255,0.16) 0%,
                transparent 70%
            );
            z-index: 12;
            pointer-events: none;
        }

        .edge-left {
            position: absolute;
            top: 4%;
            left: -2px;
            width: 5px;
            height: 92%;
            background: linear-gradient(to bottom,
                rgba(255,255,255,0.50) 0%,
                rgba(255,255,255,0.18) 20%,
                rgba(255,255,255,0.32) 55%,
                rgba(255,255,255,0.12) 80%,
                rgba(255,255,255,0.38) 100%
            );
            border-radius: 6px 0 0 6px;
            z-index: 15;
            pointer-events: none;
        }

        .edge-top {
            position: absolute;
            top: -4px;
            left: 4%;
            width: 92%;
            height: 5px;
            background: linear-gradient(to right,
                rgba(255,255,255,0.18) 0%,
                rgba(255,255,255,0.52) 22%,
                rgba(255,255,255,0.32) 50%,
                rgba(255,255,255,0.58) 76%,
                rgba(255,255,255,0.22) 100%
            );
            border-radius: 6px 6px 0 0;
            z-index: 15;
            pointer-events: none;
        }

        /* ── Rarity sticker — top-right, rotated ── */
        .rarity-sticker {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 20;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--rarity-color, #aaa);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            box-shadow:
                0 4px 24px rgba(0,0,0,0.65),
                0 0 0 3px rgba(255,255,255,0.22),
                0 0 24px color-mix(in srgb, var(--rarity-color, #aaa) 55%, transparent);
            transform: rotate(7deg);
        }

        .sticker-icon { font-size: 22px; line-height: 1; }
        .sticker-label {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000;
        }

        /* ── Bottom catalog strip ── */
        .catalog-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            z-index: 20;
            display: flex;
            align-items: stretch;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        /* Artist profile picture on the right */
        .catalog-artist-img {
            width: 90px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: #111;
        }

        .catalog-artist-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.9;
        }

        /* Gradient fade so it blends left into the catalog text area */
        .catalog-artist-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.65) 0%, transparent 50%);
        }

        /* Fallback: no artist image — show rarity color block */
        .catalog-artist-fallback {
            width: 90px;
            flex-shrink: 0;
            background: var(--rarity-color, #333);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .catalog-main {
            flex: 1;
            background: rgba(0,0,0,0.90);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 22px;
            overflow: hidden;
        }

        .cat-artist {
            font-size: 11px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-album {
            font-size: 22px;
            font-weight: 700;
            color: #f0f0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }
    </style>
</head>
<body style="--rarity-color: {{rarityColor}};">

    <div class="bg-glow"></div>

    <div class="card">

        <!-- Album art -->
        <div class="album-face">
            <img class="album-art" src="{{image}}" alt="">
        </div>

        <!-- Plastic film -->
        <div class="plastic-film">
            <svg xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="crinkleFilter" x="-5%" y="-5%" width="110%" height="110%"
                            color-interpolation-filters="linearRGB">
                        <feTurbulence type="fractalNoise"
                            baseFrequency="0.45 0.55"
                            numOctaves="5"
                            seed="12"
                            result="turbNoise"/>
                        <feDisplacementMap
                            in="SourceGraphic"
                            in2="turbNoise"
                            scale="9"
                            xChannelSelector="R"
                            yChannelSelector="B"/>
                    </filter>

                    <filter id="wrinkleLines" x="0" y="0" width="100%" height="100%">
                        <feTurbulence type="turbulence"
                            baseFrequency="0.9 0.12"
                            numOctaves="3"
                            seed="7"
                            result="lines"/>
                        <feColorMatrix type="matrix"
                            values="3 0 0 0 -1.2
                                    3 0 0 0 -1.2
                                    3 0 0 0 -1.2
                                    0 0 0 0.18 0"
                            in="lines"/>
                    </filter>

                    <linearGradient id="filmTint" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="rgba(210,225,245,0.13)"/>
                        <stop offset="50%"  stop-color="rgba(195,215,240,0.04)"/>
                        <stop offset="100%" stop-color="rgba(215,230,250,0.11)"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#filmTint)"/>
                <rect width="100%" height="100%"
                    fill="rgba(255,255,255,0.065)"
                    filter="url(#wrinkleLines)"/>
            </svg>
        </div>

        <!-- Glares + edges -->
        <div class="glare-main"></div>
        <div class="glare-crease"></div>
        <div class="glare-crease-2"></div>
        <div class="glare-pool"></div>
        <div class="edge-left"></div>
        <div class="edge-top"></div>
        <div class="film-border"></div>

        <!-- Rarity sticker — top right (only place rarity shows) -->
        <div class="rarity-sticker">
            <div class="sticker-icon">{{rarityIcon}}</div>
            <div class="sticker-label">{{rarityLabel}}</div>
        </div>

        <!-- Bottom catalog strip -->
        <div class="catalog-strip">
            {{#if artistImage}}
            <div class="catalog-artist-img">
                <img src="{{artistImage}}" alt="">
            </div>
            {{else}}
            <div class="catalog-artist-fallback"></div>
            {{/if}}
            <div class="catalog-main">
                <span class="cat-artist">{{artistName}}</span>
                <span class="cat-album">{{albumName}}</span>
            </div>
        </div>

    </div>

</body>
</html>
