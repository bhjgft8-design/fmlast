<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            background: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse 90% 60% at 50% 115%,
                color-mix(in srgb, var(--rarity-color, #5865F2) 25%, transparent) 0%,
                transparent 75%
            );
            pointer-events: none;
        }

        /* ── Outer card ── */
        .card {
            width: 960px;
            height: 1000px;
            position: relative;
        }

        .album-face {
            position: absolute;
            inset: 0;
            border-radius: 6px;
            isolation: isolate;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.9),
                0 50px 120px rgba(0,0,0,0.95);
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 6px;
        }

        /* ── Plastic cello film ── */
        .plastic-film {
            position: absolute;
            inset: -5px;
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }

        .plastic-film svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .film-border {
            position: absolute;
            inset: -5px;
            border-radius: 8px;
            border: 4px solid rgba(255,255,255,0.32);
            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.12),
                0 0 0 1px rgba(0,0,0,0.7);
            z-index: 14;
            pointer-events: none;
        }

        /* ── Glares ── */
        .glare-main {
            position: absolute;
            top: -15%;
            left: -10%;
            width: 60%;
            height: 85%;
            background: linear-gradient(
                132deg,
                rgba(255,255,255,0.32) 0%,
                rgba(255,255,255,0.14) 22%,
                rgba(255,255,255,0.05) 52%,
                transparent 72%
            );
            border-radius: 50%;
            transform: rotate(-10deg);
            z-index: 12;
            pointer-events: none;
        }

        .glare-crease {
            position: absolute;
            top: 25%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.22) 15%,
                rgba(255,255,255,0.40) 42%,
                rgba(255,255,255,0.20) 68%,
                transparent 92%
            );
            transform: rotate(-1.5deg);
            z-index: 13;
            pointer-events: none;
        }

        .glare-crease-2 {
            position: absolute;
            top: 65%;
            left: 0;
            width: 70%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.18) 20%,
                rgba(255,255,255,0.28) 50%,
                transparent 82%
            );
            transform: rotate(0.8deg);
            z-index: 13;
            pointer-events: none;
        }

        .glare-pool {
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 25%;
            height: 20%;
            background: radial-gradient(
                ellipse at center,
                rgba(255,255,255,0.18) 0%,
                transparent 70%
            );
            z-index: 12;
            pointer-events: none;
        }

        .edge-left {
            position: absolute;
            top: 5%;
            left: -3px;
            width: 7px;
            height: 90%;
            background: linear-gradient(to bottom,
                rgba(255,255,255,0.52) 0%,
                rgba(255,255,255,0.20) 20%,
                rgba(255,255,255,0.35) 55%,
                rgba(255,255,255,0.15) 80%,
                rgba(255,255,255,0.40) 100%
            );
            border-radius: 8px 0 0 8px;
            z-index: 15;
            pointer-events: none;
        }

        .edge-top {
            position: absolute;
            top: -5px;
            left: 5%;
            width: 90%;
            height: 7px;
            background: linear-gradient(to right,
                rgba(255,255,255,0.20) 0%,
                rgba(255,255,255,0.55) 22%,
                rgba(255,255,255,0.35) 50%,
                rgba(255,255,255,0.60) 76%,
                rgba(255,255,255,0.25) 100%
            );
            border-radius: 8px 8px 0 0;
            z-index: 15;
            pointer-events: none;
        }

        /* ── Rarity sticker ── */
        .rarity-sticker {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 20;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--rarity-color, #aaa);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow:
                0 6px 30px rgba(0,0,0,0.7),
                0 0 0 4px rgba(255,255,255,0.25),
                0 0 35px color-mix(in srgb, var(--rarity-color, #aaa) 60%, transparent);
            transform: rotate(8deg);
        }

        .sticker-icon { font-size: 32px; line-height: 1; }
        .sticker-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000;
        }

        /* ── Bottom catalog strip ── */
        .catalog-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            z-index: 20;
            display: flex;
            align-items: stretch;
            border-top: 2px solid rgba(255,255,255,0.08);
        }

        .catalog-artist-img {
            width: 120px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            background: #111;
        }

        .catalog-artist-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.95;
        }

        .catalog-artist-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.7) 0%, transparent 60%);
        }

        .catalog-artist-fallback {
            width: 120px;
            flex-shrink: 0;
            background: var(--rarity-color, #333);
        }

        .catalog-main {
            flex: 1;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 30px;
            overflow: hidden;
        }

        .cat-artist {
            font-size: 14px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-album {
            font-size: 32px;
            font-weight: 700;
            color: #f8f8f8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* ── Variants ── */
        .variant-ERROR img.album-art {
            filter: invert(1) hue-rotate(90deg) contrast(1.5);
        }

        .variant-HOLOGRAPHIC::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                125deg,
                rgba(255, 0, 0, 0.4) 0%,
                rgba(255, 154, 0, 0.4) 10%,
                rgba(208, 222, 33, 0.4) 20%,
                rgba(79, 220, 74, 0.4) 30%,
                rgba(63, 218, 216, 0.4) 40%,
                rgba(47, 201, 226, 0.4) 50%,
                rgba(28, 127, 238, 0.4) 60%,
                rgba(95, 21, 242, 0.4) 70%,
                rgba(186, 12, 248, 0.4) 80%,
                rgba(251, 7, 217, 0.4) 90%,
                rgba(255, 0, 0, 0.4) 100%
            );
            mix-blend-mode: color-dodge;
            z-index: 5;
            pointer-events: none;
        }

        /* ── Polish Levels (Static Foil FX) ── */
        
        /* 🥇 GOLD (Level 1) - Shattered Gold Foil */
        body.polish-1 .cat-album {
            background: linear-gradient(135deg, #FFDF00 20%, #FFF8DC 40%, #B8860B 60%, #FFDF00 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255,215,0,0.6);
        }
        body.polish-1 .album-face::before {
            content: ''; position: absolute; inset: -8px;
            background: repeating-linear-gradient(45deg, #FFDF00 0%, #B8860B 10%, #FFDF00 20%);
            z-index: -1; border-radius: 8px; box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        body.polish-1 .album-face::after {
            content: ''; position: absolute; inset: 0;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.4) 45%, rgba(255,255,255,0) 60%),
                repeating-linear-gradient(115deg, rgba(255,215,0,0.15) 0px, rgba(218,165,32,0.15) 15px, rgba(255,215,0,0.15) 30px);
            mix-blend-mode: overlay; z-index: 5; pointer-events: none;
        }

        /* 💎 DIAMOND (Level 2) - Prismatic Ice Foil */
        body.polish-2 .cat-album {
            background: linear-gradient(135deg, #E0FFFF 20%, #FFFFFF 40%, #00FFFF 60%, #E0FFFF 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0,255,255,0.7);
        }
        body.polish-2 .album-face::before {
            content: ''; position: absolute; inset: -10px;
            background: repeating-linear-gradient(45deg, #00FFFF 0%, #FFFFFF 10%, #4682B4 20%, #00FFFF 30%);
            z-index: -1; border-radius: 10px; box-shadow: 0 0 25px rgba(0,255,255,0.6);
        }
        body.polish-2 .album-face::after {
            content: ''; position: absolute; inset: 0;
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 10%),
                radial-gradient(circle at 70% 70%, rgba(255,255,255,0.4) 0%, transparent 10%),
                linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.5) 35%, rgba(0,255,255,0.2) 50%, transparent 65%),
                repeating-linear-gradient(45deg, rgba(0,255,255,0.1) 0px, rgba(255,255,255,0.1) 5px, rgba(0,255,255,0.1) 10px);
            mix-blend-mode: color-dodge; z-index: 5; pointer-events: none;
        }

        /* 🌈 RAINBOW (Level 3) - Secret Rare Full Art */
        body.polish-3 .cat-album {
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
        body.polish-3 .album-face::before {
            content: ''; position: absolute; inset: -12px;
            background: conic-gradient(from 45deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            z-index: -1; border-radius: 12px; box-shadow: 0 0 35px rgba(255,255,255,0.5);
        }
        body.polish-3 .album-face::after {
            content: ''; position: absolute; inset: 0;
            background-image: 
                linear-gradient(125deg, rgba(255,0,0,0.15) 0%, rgba(255,255,0,0.15) 20%, rgba(0,255,0,0.15) 40%, rgba(0,255,255,0.15) 60%, rgba(0,0,255,0.15) 80%, rgba(255,0,255,0.15) 100%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0) 10px, rgba(255,255,255,0.08) 20px),
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.6) 0%, transparent 8%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.6) 0%, transparent 8%);
            mix-blend-mode: color-dodge; z-index: 5; pointer-events: none;
        }

        /* ── Polish Levels (Static Foil FX) ── */
    </style>
</head>
<body class="polish-{{polishLevel}}" style="--rarity-color: {{rarityColor}};">

    <div class="bg-glow"></div>

    <div class="card">

        <!-- Album art -->
        <div class="album-face">
            <img class="album-art" src="{{image}}" alt="">
        </div>

        <!-- Plastic film -->
        <div class="plastic-film">
            <svg xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="crinkleFilter" x="-5%" y="-5%" width="110%" height="110%"
                            color-interpolation-filters="linearRGB">
                        <feTurbulence type="fractalNoise"
                            baseFrequency="0.45 0.55"
                            numOctaves="5"
                            seed="12"
                            result="turbNoise"/>
                        <feDisplacementMap
                            in="SourceGraphic"
                            in2="turbNoise"
                            scale="12"
                            xChannelSelector="R"
                            yChannelSelector="B"/>
                    </filter>

                    <filter id="wrinkleLines" x="0" y="0" width="100%" height="100%">
                        <feTurbulence type="turbulence"
                            baseFrequency="0.9 0.12"
                            numOctaves="3"
                            seed="7"
                            result="lines"/>
                        <feColorMatrix type="matrix"
                            values="4 0 0 0 -1.5
                                    4 0 0 0 -1.5
                                    4 0 0 0 -1.5
                                    0 0 0 0.22 0"
                            in="lines"/>
                    </filter>

                    <linearGradient id="filmTint" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="rgba(215,230,255,0.15)"/>
                        <stop offset="50%"  stop-color="rgba(200,220,245,0.05)"/>
                        <stop offset="100%" stop-color="rgba(220,235,255,0.13)"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#filmTint)"/>
                <rect width="100%" height="100%"
                    fill="rgba(255,255,255,0.08)"
                    filter="url(#wrinkleLines)"/>
            </svg>
        </div>

        <!-- Glares + edges -->
        <div class="glare-main"></div>
        <div class="glare-crease"></div>
        <div class="glare-crease-2"></div>
        <div class="glare-pool"></div>
        <div class="edge-left"></div>
        <div class="edge-top"></div>
        <div class="film-border"></div>

        <!-- Rarity sticker -->
        <div class="rarity-sticker">
            <div class="sticker-icon">{{rarityIcon}}</div>
            <div class="sticker-label">{{rarityLabel}}</div>
        </div>

        <!-- Bottom catalog strip -->
        <div class="catalog-strip">
            {{#if artistImage}}
            <div class="catalog-artist-img">
                <img src="{{artistImage}}" alt="">
            </div>
            {{else}}
            <div class="catalog-artist-fallback"></div>
            {{/if}}
            <div class="catalog-main">
                <span class="cat-artist">{{artistName}}</span>
                <span class="cat-album">{{albumName}}</span>
            </div>
        </div>

    </div>

</body>
</html>
