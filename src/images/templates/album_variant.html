<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1080px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .canvas {
            width: 1080px;
            height: 1080px;
            position: relative;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .art-container {
            width: 1040px;
            height: 1040px;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            overflow: hidden;
            background: #000;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── HOLOGRAPHIC (Rainbow Rare Style) ── */
        .variant-HOLOGRAPHIC .art-container {
            border: 4px solid #fff;
            border-radius: 20px;
        }

        .variant-HOLOGRAPHIC .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* Shifting pastel rainbow overlay */
            background: linear-gradient(125deg, 
                rgba(255, 154, 154, 0.4), 
                rgba(255, 206, 154, 0.4), 
                rgba(255, 255, 154, 0.4), 
                rgba(154, 255, 154, 0.4), 
                rgba(154, 255, 255, 0.4), 
                rgba(154, 154, 255, 0.4), 
                rgba(255, 154, 255, 0.4)
            );
            mix-blend-mode: color-dodge;
            z-index: 2;
        }

        .variant-HOLOGRAPHIC .texture {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* Diagonal foil texture */
            background: repeating-linear-gradient(45deg, 
                rgba(255,255,255,0.1) 0px, 
                rgba(255,255,255,0.1) 2px, 
                transparent 2px, 
                transparent 8px
            );
            mix-blend-mode: overlay;
            z-index: 3;
            box-shadow: inset 0 0 100px rgba(255,255,255,0.5);
        }

        .variant-HOLOGRAPHIC .sparkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 10% 20%, #fff 0%, transparent 1.5%),
                radial-gradient(circle at 80% 30%, #fff 0%, transparent 2%),
                radial-gradient(circle at 30% 70%, #fff 0%, transparent 1.5%),
                radial-gradient(circle at 70% 80%, #fff 0%, transparent 2%),
                radial-gradient(circle at 50% 50%, #fff 0%, transparent 2.5%);
            filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 20px #ff00ff);
            z-index: 4;
            mix-blend-mode: screen;
        }


        /* ── ERROR (Corrupted / VHS Style) ── */
        .variant-ERROR .art-container {
            border: 4px solid #ff0055;
            border-radius: 0px;
        }

        .variant-ERROR .album-art {
            filter: grayscale(100%) contrast(150%) brightness(0.8);
        }

        .variant-ERROR .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* VHS Scanlines and RGB split */
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.2) 0px,
                rgba(0,0,0,0.2) 2px,
                transparent 2px,
                transparent 4px
            );
            z-index: 2;
        }

        .variant-ERROR .texture {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* Blood red overlay mapping */
            background: linear-gradient(to bottom, rgba(255,0,85,0.4), rgba(0,255,255,0.2));
            mix-blend-mode: hard-light;
            z-index: 3;
            box-shadow: inset 0 0 150px rgba(255,0,85,0.8);
        }

        .variant-ERROR .glitch-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 20px;
            text-transform: uppercase;
            text-shadow: 5px 5px 0px #00ffff, -5px -5px 0px #ff0055;
            z-index: 10;
            mix-blend-mode: exclusion;
            pointer-events: none;
        }

        /* Glitch shifts */
        .variant-ERROR .shift-1 {
            position: absolute;
            top: 10%;
            left: -20px;
            width: 100%;
            height: 15%;
            background-image: url('{{image}}');
            background-size: 1040px 1040px;
            background-position: 0 10%;
            filter: grayscale(100%) contrast(200%) hue-rotate(90deg);
            mix-blend-mode: screen;
            z-index: 4;
            opacity: 0.8;
            border-top: 2px solid #00ffff;
            border-bottom: 2px solid #00ffff;
        }

        .variant-ERROR .shift-2 {
            position: absolute;
            top: 60%;
            left: 30px;
            width: 100%;
            height: 10%;
            background-image: url('{{image}}');
            background-size: 1040px 1040px;
            background-position: 0 60%;
            filter: grayscale(100%) contrast(200%) hue-rotate(-90deg);
            mix-blend-mode: screen;
            z-index: 4;
            opacity: 0.8;
            border-top: 2px solid #ff0055;
            border-bottom: 2px solid #ff0055;
        }

    </style>
</head>
<body class="variant-{{variant}}">
    <div class="canvas">
        <div class="art-container">
            <img class="album-art" src="{{image}}" alt="">
            <div class="overlay"></div>
            <div class="texture"></div>
            <div class="sparkles"></div>
            
            <div class="shift-1"></div>
            <div class="shift-2"></div>
            <div class="glitch-text">ERROR</div>
        </div>
    </div>

    <script>
        const variant = "{{variant}}";
        if (variant !== 'ERROR') {
            document.querySelectorAll('.shift-1, .shift-2, .glitch-text').forEach(e => e.style.display = 'none');
        } else {
            document.querySelectorAll('.sparkles').forEach(e => e.style.display = 'none');
        }
    </script>
</body>
</html>
