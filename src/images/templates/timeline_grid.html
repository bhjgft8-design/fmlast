<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 400px;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        .slot {
            flex: 1;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .label {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 26px;
            font-weight: 800;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .timeline-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, #6366f1, #a855f7, #6366f1);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="slot" style="background-image: url('{{url1}}');">
            <div class="label">1</div>
        </div>
        <div class="slot" style="background-image: url('{{url2}}');">
            <div class="label">2</div>
        </div>
        <div class="slot" style="background-image: url('{{url3}}');">
            <div class="label">3</div>
        </div>
        <div class="timeline-bar"></div>
    </div>
</body>
</html>
