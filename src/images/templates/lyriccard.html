<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1080px;
            height: 1080px;
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Cinematic Background */
        .bg-layer {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('{{coverUrl}}');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.5);
            z-index: 0;
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.95) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            padding: 56px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #222;
        }

        .header-info {
            margin-left: 20px;
            flex-grow: 1;
        }

        .top-title {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .top-artist {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .page-indicator {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.3);
            font-variant-numeric: tabular-nums;
        }

        /* Lyric Body */
        .lyric-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 100px;
        }

        .quote-open {
            position: absolute;
            top: 20%;
            left: 50px;
            font-size: 280px;
            font-family: serif;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.08);
            line-height: 1;
        }

        .quote-close {
            position: absolute;
            bottom: -40px;
            right: 50px;
            font-size: 320px;
            font-family: serif;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.08);
            line-height: 1;
        }

        .lyric-text {
            font-size: 56px;
            font-weight: 700;
            font-style: italic;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 4px 16px rgba(0,0,0,0.4);
            line-height: 1.4;
            max-width: 860px;
            white-space: pre-wrap;
        }

        /* Footer */
        .footer {
            padding: 0 0 50px 0;
            text-align: center;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.2) 80%, transparent 100%);
            margin-bottom: 40px;
            width: 100%;
        }

        .footer-track {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .footer-artist {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
        }

        .footer-source {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="gradient-overlay"></div>
    
    <div class="content">
        <div class="header">
            <img class="avatar" src="{{topImage}}" onerror="this.src='{{coverUrl}}'">
            <div class="header-info">
                <div class="top-title">{{topTitle}}</div>
                <div class="top-artist">{{artist}}</div>
            </div>
            {{#if hasLyrics}}
            <div class="page-indicator">{{pageInfo}}</div>
            {{/if}}
        </div>

        <div class="lyric-container">
            <div class="quote-open">&ldquo;</div>
            <div class="lyric-text" dir="{{textDirection}}">{{lyricSnippet}}</div>
            <div class="quote-close">&rdquo;</div>
        </div>

        <div class="footer">
            <div class="divider"></div>
            <div class="footer-track">{{track}}</div>
            <div class="footer-artist">&mdash; {{artist}}</div>
            <div class="footer-source">LYRICS FROM {{source}}</div>
        </div>
    </div>
</body>
</html>
