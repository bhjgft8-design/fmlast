services:
  db:
    image: postgres:16-alpine
    container_name: fm2-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fmbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: fm2-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mongo:
    image: mongo:latest
    container_name: fm2-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  bot:
    build: .
    container_name: fm2-bot
    restart: always
    depends_on:
      - db
      - redis
      - mongo
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/fmbot?schema=public
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongo:27017/fmbot
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
  mongodata:
